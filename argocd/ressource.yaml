apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ressource
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/goon-corp/Cesi-Ressource-Infra.git
    targetRevision: HEAD
    path: apps/ressource
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: ressource
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
